<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ren Studios — Nora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAFAF8;
      --surface: #F4F0EB;
      --border: #E5E0D8;
      --text-primary: #1C1C1A;
      --text-secondary: #7A746E;
      --accent: #B5A396;
      --nora-bg: #F2EDE7;
      --user-bg: #1C1C1A;
      --user-text: #FAFAF8;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── API Key Screen ── */
    #api-key-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .setup-card {
      max-width: 460px;
      width: 100%;
      text-align: center;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .brand-sub {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 3.5rem;
    }

    .field-label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
      text-align: left;
    }

    .field-input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 1px solid var(--border);
      background: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 0.75rem;
      border-radius: 2px;
    }

    .field-input:focus { border-color: var(--accent); }

    .field-note {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-bottom: 1.75rem;
      text-align: left;
      line-height: 1.5;
    }

    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      background: var(--text-primary);
      color: var(--bg);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      border-radius: 2px;
    }

    .btn-primary:hover { background: #333330; }
    .btn-primary:disabled { background: var(--accent); cursor: not-allowed; }

    /* ── Chat App ── */
    #chat-app {
      display: none;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    .chat-header {
      padding: 1.4rem 2rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      flex-shrink: 0;
    }

    .header-left .h-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .header-left .h-sub {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    .header-right { text-align: right; }

    .header-right .h-nora {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    .btn-text {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      margin-top: 3px;
      display: block;
      transition: color 0.2s;
    }

    .btn-text:hover { color: var(--text-primary); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 2rem 1rem;
      scroll-behavior: smooth;
    }

    .message {
      margin-bottom: 1.5rem;
      max-width: 78%;
    }

    .message.nora { margin-right: auto; }
    .message.user { margin-left: auto; }

    .msg-sender {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.35rem;
    }

    .msg-bubble {
      padding: 0.9rem 1.15rem;
      line-height: 1.7;
      font-size: 0.9rem;
      border-radius: 2px;
    }

    .message.nora .msg-bubble {
      background: var(--nora-bg);
      color: var(--text-primary);
      border-radius: 0 8px 8px 8px;
    }

    .message.user .msg-bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-radius: 8px 0 8px 8px;
    }

    /* Nora bubble markdown rendering */
    .msg-bubble strong { font-weight: 600; }
    .msg-bubble em { font-style: italic; color: var(--text-secondary); }
    .msg-bubble .product-name { font-weight: 600; }
    .msg-bubble .price { color: var(--text-secondary); font-size: 0.85rem; }
    .msg-bubble .why { font-style: italic; color: var(--text-secondary); }
    .msg-bubble p { margin-bottom: 0.6rem; }
    .msg-bubble p:last-child { margin-bottom: 0; }

    /* Typing indicator */
    .typing {
      margin-bottom: 1.5rem;
      max-width: 78%;
    }

    .typing-dots {
      display: inline-flex;
      gap: 5px;
      padding: 0.9rem 1.15rem;
      background: var(--nora-bg);
      border-radius: 0 8px 8px 8px;
    }

    .dot {
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.3s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes pulse {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input ── */
    .chat-input-area {
      padding: 1.1rem 2rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 0.65rem;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      background: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--text-primary);
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      max-height: 110px;
      line-height: 1.5;
      border-radius: 2px;
    }

    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      padding: 0.75rem 1.25rem;
      background: var(--text-primary);
      color: var(--bg);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      align-self: stretch;
      border-radius: 2px;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) { background: #333330; }
    #send-btn:disabled { background: var(--accent); cursor: not-allowed; }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Product recommendation cards */
    .product-card {
      display: flex;
      margin: 0.75rem 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
    }
    .product-img {
      width: 100px;
      min-height: 120px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface);
      display: block;
    }
    .product-details {
      padding: 0.65rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      justify-content: center;
      flex: 1;
    }
    .product-header { font-size: 0.875rem; }
    .product-header .price {
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: normal;
    }
    .product-desc {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .product-why {
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-style: italic;
      line-height: 1.5;
      margin-top: 0.15rem;
    }

    /* Error */
    .error-banner {
      background: #FEF2F2;
      color: #B91C1C;
      padding: 0.65rem 1rem;
      font-size: 0.8rem;
      border-radius: 2px;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

<!-- ── API Key Screen ── -->
<div id="api-key-screen">
  <div class="setup-card">
    <h1 class="brand-name">Ren Studios</h1>
    <p class="brand-sub">Personal Styling Assistant</p>
    <label class="field-label" for="api-key-input">Anthropic API Key</label>
    <input
      type="password"
      id="api-key-input"
      class="field-input"
      placeholder="sk-ant-api03-…"
      autocomplete="off"
      onkeydown="if(event.key==='Enter') startChat()"
    />
    <p class="field-note">Your key is used only for this session and is never stored or transmitted beyond the API call.</p>
    <button class="btn-primary" onclick="startChat()">Begin</button>
    <div id="setup-error"></div>
  </div>
</div>

<!-- ── Chat Interface ── -->
<div id="chat-app">
  <header class="chat-header">
    <div class="header-left">
      <div class="h-brand">Ren Studios</div>
      <div class="h-sub">Personal Styling Assistant</div>
    </div>
    <div class="header-right">
      <div class="h-nora">Nora</div>
      <button class="btn-text" onclick="resetToSetup()">Change API Key</button>
    </div>
  </header>
  <div id="messages"></div>
  <div class="chat-input-area">
    <div class="input-row">
      <textarea
        id="user-input"
        placeholder="Message Nora…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div id="chat-error"></div>
  </div>
</div>

function buildProductData() {
  const lines = PRODUCT_CSV.trim().split('\n');
  const headers = lines[0].split(',');
  const products = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(',');
    const p = {};
    headers.forEach((h, idx) => { p[h.trim()] = (vals[idx] || '').trim(); });
    products.push(p);
  }

  let out = 'PRODUCT CATALOGUE — REN STUDIOS\n';
  out += 'ID|Name|Category|Color|Material|Length|Fit|Sleeve|Occasion|Price\n\n';
  products.forEach(p => {
    out += `${p.product_id}|${p.product_name}|${p.category}|${p.color}|${p.material}|${p.length||'-'}|${p.fit}|${p.sleeve||'-'}|${p.occasion}|€${p.price}\n`;
  });
  // season, neckline, style fields excluded to reduce token count
  return out;
}

function buildPolicyData() {
  let out = 'SERVICE POLICIES — REN STUDIOS\n\n';
  const categories = {};
  POLICIES.policies.forEach(p => {
    if (!categories[p.category]) categories[p.category] = [];
    categories[p.category].push(p);
  });
  Object.entries(categories).forEach(([cat, items]) => {
    out += cat.toUpperCase().replace(/_/g, ' ') + '\n';
    items.forEach(item => {
      out += `• ${item.title}: ${item.policy}\n`;
    });
    out += '\n';
  });
  return out;
}

function buildProductLookup() {
  const lines = PRODUCT_CSV.trim().split('\n');
  const headers = lines[0].split(',');
  const lookup = {};
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(',');
    const p = {};
    headers.forEach((h, idx) => { p[h.trim()] = (vals[idx] || '').trim(); });
    if (p.product_name) lookup[p.product_name] = p;
  }
  return lookup;
}

const PRODUCT_LOOKUP = buildProductLookup();

const SYSTEM_PROMPT = `You are Nora, the personal styling assistant for Ren Studios — a Scandinavian womenswear brand known for clean lines, refined materials, and effortless elegance. You help customers find the right piece from the Ren Studios collection. Think of yourself as a knowledgeable in-store stylist: attentive, considered, and confident in your recommendations. You guide customers toward the right product rather than leaving them to browse.

TONE OF VOICE
Warm but restrained. Helpful and friendly without being effusive. Your language is precise and elegant — in keeping with the Ren Studios aesthetic. Avoid filler phrases, excessive enthusiasm, and overly casual language. Short, clear sentences. Always respectful, never rushed.

WHAT YOU CAN DO
- Help customers find products from the Ren Studios catalogue
- Answer questions about Ren Studios service policies
- Escalate to human support when a query is beyond your scope

WHAT YOU CANNOT DO
- Access specific order data — tracking, order status, missing or late deliveries
- Resolve complaints or disputes about past purchases
- Provide detailed personal fit advice beyond standard size conversions
- Answer questions about other brands or topics unrelated to Ren Studios

STOCK AVAILABILITY
All products in the catalogue are currently in stock and available in all sizes. If a customer asks about availability or whether something is available in their size, confirm that it is.

CONVERSATION FLOW
Guide the customer through up to four structured questions before making recommendations. Ask one question at a time — never ask multiple questions in a single message.

If the customer volunteers information early (for example, mentions colour or fit in their opening message), acknowledge it, note it, and skip that question. Move directly to the next unanswered one.

Question 1 — Intent: Understand what they are shopping for — the occasion, context, or type of product. The opening greeting has already been delivered by the interface — do not introduce yourself again. Ask directly: "What are you looking for today?"
Question 2 — Colour: Ask if they have a colour in mind, including anything they would like to avoid.
Question 3 — Fit: Map to one of four values: Relaxed, Regular, Slim, or Tailored. Skip this question for skirts — ask about length instead.
Question 4 — Length or silhouette: For dresses and skirts: Mini, Midi, or Maxi. For other categories: ask whether they prefer a longer or more cropped cut. If the customer is shopping for skirts, ask this question in place of Question 3.

ON PRICE: Do not ask about price. Ren Studios is a premium brand and customers are assumed to be comfortable with premium pricing. However, if the customer mentions budget or price at any point, take it into account when selecting recommendations — favour items at the lower end of the matching range without drawing attention to it.

MAKING RECOMMENDATIONS
Once you have gathered the customer's preferences, recommend exactly three products. Never fewer, never more.

Present recommendations with this opening line: "Based on what you're looking for, here are three pieces that could work well."

Present each item in this exact format:
**[Product name]** — €[price]
*Why this works: [Personalised explanation]*

The Why this works explanation is not a repeat of the description. It is a short, specific statement connecting the product to this customer's stated needs — their occasion, fit preference, and length. It should read like something a thoughtful stylist would say.

ON SELECTING PRODUCTS: Match to the customer's stated occasion, colour, fit, and length. If the customer specifies a product category (e.g. skirts, dresses, blouses, trousers), only recommend items from that category — never substitute a different category, even if the match on other attributes is close. If no exact match exists within the correct category, choose the closest within that category and acknowledge the trade-off briefly in the Why this works note. Do not recommend the same product twice. If the customer has mentioned price, favour items at the lower end of the relevant range.

AFTER RECOMMENDATIONS
If the customer is not satisfied, ask what didn't work — colour, fit, style, or occasion feel — and use that to refine your selection. Offer up to three alternative products from the remaining catalogue. You do not need to repeat all five questions; work with what they tell you.

If there are no further matching products, respond: "I don't have anything else in the current collection that matches what you're looking for, but I'd suggest reaching out to our team — they may be able to help or let you know if something suitable is on the way." Then offer the handoff.

SERVICE POLICY QUESTIONS
Answer directly from the policy data. Do not improvise or make exceptions not stated in the policy.
You can answer general policy questions (e.g. can I cancel an order, what payment methods do you accept).
You cannot answer specific order enquiries (e.g. where is my order, why hasn't my parcel arrived). Specific order queries require human support.

HUMAN HANDOFF
Escalate when:
- Customer asks about a specific order — status, tracking, missing or late delivery
- Customer reports a damaged, faulty, or incorrect item — acknowledge the policy, then escalate
- Customer raises a complaint or dispute about a past purchase
- Customer asks for detailed fit guidance beyond standard size conversion
- No suitable products remain after refining
- You cannot find an answer in your available data

If the customer asks to speak to a person without context, ask what they need first. Only escalate if their query falls into the above categories or they confirm they want human support.

HANDOFF: Direct the customer to reach Ren Studios support by email or through the contact form on the website. Response time is 1–2 business days.

OUT-OF-SCOPE QUESTIONS
Respond briefly and redirect: "I'm only able to help with Ren Studios products and orders, but I'd be happy to help you find something in our collection."

---

${buildProductData()}

---

${buildPolicyData()}`;

let API_KEY = '';
let history = [];
let streaming = false;

// ════════════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════════════

function startChat() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) {
    showSetupError('Please enter your Anthropic API key.');
    return;
  }
  if (key.length < 20) {
    showSetupError('That doesn\'t look like a valid API key — please check and try again.');
    return;
  }
  API_KEY = key;
  console.log('API key set. Length:', key.length, '| Starts with:', key.substring(0, 10));
  document.getElementById('api-key-screen').style.display = 'none';
  document.getElementById('chat-app').style.display = 'flex';
  addNoraMessage("Welcome to Ren Studios. I'm Nora, your personal shopping assistant. How can I help you today?");
}

function showSetupError(msg) {
  document.getElementById('setup-error').innerHTML = `<div class="error-banner">${msg}</div>`;
}

function resetToSetup() {
  API_KEY = '';
  history = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('api-key-input').value = '';
  document.getElementById('setup-error').innerHTML = '';
  document.getElementById('chat-app').style.display = 'none';
  document.getElementById('api-key-screen').style.display = 'flex';
}

// ════════════════════════════════════════════════
//  MESSAGES
// ════════════════════════════════════════════════

function addNoraMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message nora';
  div.innerHTML = `<div class="msg-sender">Nora</div><div class="msg-bubble">${renderMarkdown(text)}</div>`;
  msgs.appendChild(div);
  scrollBottom();
  return div.querySelector('.msg-bubble');
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="msg-sender" style="text-align:right">You</div><div class="msg-bubble">${escapeHtml(text)}</div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ════════════════════════════════════════════════
//  MARKDOWN RENDERER
// ════════════════════════════════════════════════

function renderMarkdown(text) {
  // Escape HTML first
  let html = escapeHtml(text);

  // Bold: **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic: *text* (but not ** already processed)
  html = html.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');

  // Paragraphs: double newlines
  const paragraphs = html.split(/\n\n+/);
  if (paragraphs.length > 1) {
    html = paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  } else {
    html = html.replace(/\n/g, '<br>');
  }

  return html;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderWithImages(text) {
  // Match Nora's format: **Name** — €Price\n*Why this works: ...*
  const recPattern = /\*\*([^\*\n]+)\*\*\s*[—–\-]\s*€(\d+)\n+\*Why this works:\s*([^*]+)\*/g;
  let result = '';
  let lastIndex = 0;
  let match;
  recPattern.lastIndex = 0;

  while ((match = recPattern.exec(text)) !== null) {
    if (match.index > lastIndex) {
      result += renderMarkdown(text.slice(lastIndex, match.index));
    }
    const name = match[1].trim();
    const price = match[2];
    const why = match[3].trim();
    const product = PRODUCT_LOOKUP[name];

    if (product) {
      result += `<div class="product-card">` +
        `<img class="product-img" src="images/${product.product_id}.jpg" alt="${escapeHtml(name)}" onerror="this.style.display='none'">` +
        `<div class="product-details">` +
        `<div class="product-header"><strong>${escapeHtml(name)}</strong> <span class="price">€${price}</span></div>` +
        (product.description ? `<div class="product-desc">${escapeHtml(product.description)}</div>` : '') +
        `<div class="product-why"><em>Why this works: ${escapeHtml(why)}</em></div>` +
        `</div></div>`;
    } else {
      result += renderMarkdown(match[0]);
    }
    lastIndex = recPattern.lastIndex;
  }

  if (lastIndex < text.length) {
    result += renderMarkdown(text.slice(lastIndex));
  }
  return result || renderMarkdown(text);
}

// ════════════════════════════════════════════════
//  CHAT
// ════════════════════════════════════════════════

async function sendMessage() {
  if (streaming) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('chat-error').innerHTML = '';
  document.getElementById('send-btn').disabled = true;

  addUserMessage(text);
  history.push({ role: 'user', content: text });

  showTyping();
  streaming = true;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 2048,
        stream: true,
        system: SYSTEM_PROMPT,
        messages: history.slice(-12)
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      console.error('API error response:', response.status, JSON.stringify(err));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    removeTyping();

    // Create Nora message bubble for streaming
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message nora';
    div.innerHTML = `<div class="msg-sender">Nora</div><div class="msg-bubble" id="streaming-bubble"></div>`;
    msgs.appendChild(div);
    const bubble = document.getElementById('streaming-bubble');

    let fullText = '';
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const evt = JSON.parse(data);
          if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
            fullText += evt.delta.text;
            bubble.innerHTML = renderMarkdown(fullText);
            scrollBottom();
          }
        } catch (_) {}
      }
    }

    bubble.innerHTML = renderWithImages(fullText);
    bubble.removeAttribute('id');
    history.push({ role: 'assistant', content: fullText });

  } catch (err) {
    removeTyping();
    let msg = err.message || 'Something went wrong. Please try again.';
    if (msg.includes('429')) {
      msg = 'Rate limit reached. Please wait a moment and try again.';
    }
    document.getElementById('chat-error').innerHTML = `<div class="error-banner">${msg}</div>`;
  } finally {
    streaming = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }
}

// ════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
</script>
